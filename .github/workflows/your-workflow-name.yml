# 文件位置：.github/workflows/stock-analysis.yml
name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 20 * * 1-5'  # 工作日20:00运行（北京时间）
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run analysis
      run: |
        python main.py
      env:
        API_KEY: $
        TUSHARE_TOKEN: $
